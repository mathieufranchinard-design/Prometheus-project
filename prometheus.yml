global:
  scrape_interval: 10s
  evaluation_interval: 15s
  external_labels:
    environment: lab
    replica: A

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'demo-api'
    static_configs:
      - targets: ['demo-api:8000']

  - job_name: node
    file_sd_configs:
      - files: 
          - /etc/prometheus/sd/targets.json
        refresh_interval: 5s
rule_files:
  - /etc/prometheus/rules/api_rules.yml
